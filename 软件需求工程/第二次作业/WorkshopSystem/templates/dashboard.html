<!DOCTYPE html>
<html>
<head>
    <title>个人主页 - 数字化车间管理系统</title>
    <style>
        /* CSS样式可以根据需要自行调整 */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f0f0f0;
        }
        .container {
            max-width: 960px;
            margin: 50px auto;
            padding: 20px;
            background-color: #fff;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }
        .profile {
            margin-bottom: 20px;
        }
        .profile h2 {
            margin-bottom: 10px;
        }
        .btn {
            background-color: #007bff;
            color: #fff;
            padding: 10px 20px;
            border: none;
            border-radius: 3px;
            cursor: pointer;
        }
        .btn:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="profile">
            <h2>个人信息</h2>
            <p>用户名: {{ username }}</p>
            <p>邮箱: {{ email }}</p>
        </div>
        <a href="/logout" class="btn">退出登录</a>
    </div>
</body>
</html>
